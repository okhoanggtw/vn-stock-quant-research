version: '3.8'

services:
  # 1. Cơ sở dữ liệu Postgres phục vụ lưu trữ siêu dữ liệu (Metadata) cho Airflow
  postgres:
    image: postgres:13
    container_name: vn_stock_postgres
    restart: always
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Apache Airflow Webserver (Giao diện Web theo dõi DAG tại http://localhost:8080)
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: vn_stock_airflow_webserver
    hostname: airflow-webserver
    restart: always
    command: webserver
    entrypoint: >
      bash -c "airflow db init && airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin && airflow webserver"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - LOAD_EXPARFLOW=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__WEBSERVER__SECRET_KEY=vn_stock_quant_secret_key_production_32_chars_long_and_secure
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
      - ./reports:/opt/airflow/reports
    ports:
      - "8080:8080"

  # 3. Apache Airflow Scheduler (Bộ lập lịch chạy các Task)
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: vn_stock_airflow_scheduler
    hostname: airflow-scheduler
    restart: always
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - LOAD_EXPARFLOW=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__WEBSERVER__SECRET_KEY=vn_stock_quant_secret_key_production_32_chars_long_and_secure
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
      - ./reports:/opt/airflow/reports

volumes:
  postgres-data:
